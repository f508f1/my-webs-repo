<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frank Schaffer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { max-width: 100%; overflow-x: hidden; }
    img { max-width: 100%; height: auto; display: block; }

    /* ── Themes ── */
    :root, [data-theme="light"] {
      --bg:       #ffffff;
      --surface:  #f4f4f4;
      --border:   #e0e0e0;
      --text:     #1a1a1a;
      --muted:    #7a7570;
      --accent:   #8b6914;
      --thumb-bg: #ececec;
      --radius: 6px;
      --gap: 16px;
      --max: 960px;
    }
    [data-theme="dark"] {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --text:     #e8e8e8;
      --muted:    #888;
      --accent:   #c8a96e;
      --thumb-bg: #1c1c1c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.5;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Header ── */
    header {
      padding: 48px 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 24px;
      height: 30px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      width: 120px;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .theme-toggle .icon-sun  { display: none; }
    .theme-toggle .icon-moon { display: inline; }
    [data-theme="dark"] .theme-toggle .icon-sun  { display: inline; }
    [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

    /* ── Layout ── */
    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    section {
      margin-top: 56px;
    }
    section h2 {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Photo gallery ── */
    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--gap);
    }

    .img-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: var(--thumb-bg);
      border-radius: var(--radius);
    }
    .img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      max-width: 100%;
      object-fit: cover;
      border-radius: var(--radius);
    }
    .img-wrap .placeholder {
      filter: blur(14px);
      transform: scale(1.08);
      transition: opacity 0.5s ease;
    }
    .img-wrap .photo {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .img-wrap .photo.loaded { opacity: 1; }
    .img-wrap:has(.photo.loaded) .placeholder { opacity: 0; }

    /* ── Video cards ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: var(--gap);
    }
    .video-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      background: var(--surface);
    }
    .video-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .video-thumb {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      background: var(--thumb-bg);
      overflow: hidden;
    }
    .video-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .video-card:hover .video-thumb img {
      transform: scale(1.04);
    }
    .play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
      transition: opacity 0.2s;
    }
    .video-card:hover .play-btn { opacity: 1; }
    .video-thumb img[style*="display:none"] + .play-btn svg path:first-child {
      fill: var(--muted);
    }
    .video-label {
      padding: 12px 14px;
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script>
  // Lazy-load fade-in
  document.querySelectorAll('.img-wrap .photo').forEach(img => {
    if (img.complete && img.naturalWidth > 0) img.classList.add('loaded');
    else img.addEventListener('load', () => img.classList.add('loaded'));
  });

  // Theme toggle — persist preference
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch(e) {}
    document.querySelector('.theme-toggle span:last-child').textContent =
      next === 'dark' ? 'Light mode' : 'Dark mode';
  }

  // Restore saved preference
  try {
    const saved = localStorage.getItem('theme');
    if (saved && saved !== 'light') {
      document.documentElement.setAttribute('data-theme', saved);
      document.querySelector('.theme-toggle span:last-child').textContent = 'Light mode';
    }
  } catch(e) {}
</script>
